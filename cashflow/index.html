<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cash Flow Forecast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.29.3/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --bg:        #0a0a0f;
            --surface:   #111118;
            --surface2:  #18181f;
            --border:    rgba(255,255,255,0.07);
            --border2:   rgba(255,255,255,0.12);
            --text:      #f0f0f5;
            --muted:     #5a5a72;
            --dim:       #3a3a50;
            --green:     #00e5b0;
            --green-dim: rgba(0,229,176,0.08);
            --red:       #ff4757;
            --red-dim:   rgba(255,71,87,0.08);
            --yellow:    #ffd32a;
            --accent:    #7c6af7;
            --sheet-radius: 20px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            background-image:
                linear-gradient(rgba(124,106,247,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,106,247,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ───────────────────────────────── */
        header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .header-date {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
        }

        /* ── MAIN CHART AREA ──────────────────────── */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0 16px 12px;
            touch-action: none; /* we handle all touch manually */
        }

        /* Stats row above chart */
        .stats-bar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
            align-items: stretch;
        }

        .stats-bar-right {
            display: flex;
            gap: 8px;
        }

        .stat-pill {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .stat-pill-label {
            font-size: 0.52rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 4px;
            color: var(--muted);
        }
        .stat-pill-label.credit { color: var(--green); }
        .stat-pill-label.debit  { color: var(--red); }
        .stat-pill-label.net    { color: var(--muted); }

        .stat-pill-balance { min-width: 0; }

        .balance-pill-row {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }
        .balance-pill-symbol {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--green);
            line-height: 1;
            flex-shrink: 0;
        }
        .balance-pill-input {
            font-family: 'DM Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            min-width: 0;
            padding: 0;
            transition: color 0.2s;
        }
        .balance-pill-input:focus { color: var(--green); }

        .stat-pill-value {
            font-family: 'DM Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }
        .stat-pill-value.credit { color: var(--green); }
        .stat-pill-value.debit  { color: var(--red); }

        /* Balance display (tappable) */
        .balance-display {
            flex-shrink: 0;
            display: flex;
            align-items: baseline;
            gap: 5px;
            margin-bottom: 12px;
            padding: 0 2px;
        }

        .balance-symbol {
            font-family: 'DM Mono', monospace;
            font-size: 1.3rem;
            font-weight: 300;
            color: var(--green);
            line-height: 1;
        }

        #startBalance {
            font-family: 'DM Mono', monospace;
            font-size: 2.4rem;
            font-weight: 500;
            color: var(--text);
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }
        #startBalance:focus { color: var(--green); }

        input[type=number] { -moz-appearance: textfield !important; appearance: textfield !important; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none !important; margin: 0 !important; }

        /* Chart */
        .chart-wrap {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #cashFlowChart {
            width: 100% !important;
            height: 100% !important;
        }

        /* ── SETTINGS TRIGGER BUTTON ──────────────── */
        .sheet-trigger {
            position: fixed;
            bottom: 24px;
            right: 20px;
            z-index: 100;
            width: 52px; height: 52px;
            border-radius: 14px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(124,106,247,0.5);
            transition: transform 0.15s, box-shadow 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .sheet-trigger:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(124,106,247,0.4); }
        .sheet-trigger svg { width: 22px; height: 22px; }

        /* ── BACKDROP ─────────────────────────────── */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .backdrop.visible {
            opacity: 1;
            pointer-events: all;
        }

        /* ── PULL-UP SHEET ────────────────────────── */
        .sheet {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            z-index: 300;
            background: var(--surface);
            border-top-left-radius: var(--sheet-radius);
            border-top-right-radius: var(--sheet-radius);
            border-top: 1px solid var(--border2);
            display: flex;
            flex-direction: column;
            /* Max height: almost full screen */
            max-height: 92vh;
            /* Start hidden below */
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            will-change: transform;
        }
        .sheet.open {
            transform: translateY(0);
        }

        /* Drag handle */
        .sheet-handle-area {
            flex-shrink: 0;
            padding: 14px 0 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            touch-action: none;
        }
        .sheet-handle {
            width: 40px; height: 4px;
            border-radius: 2px;
            background: var(--dim);
        }

        /* Sheet title */
        .sheet-title-row {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2px 20px 14px;
            border-bottom: 1px solid var(--border);
        }
        .sheet-title {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .sheet-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }
        .sheet-close:active { background: var(--surface2); }

        /* Scrollable content inside sheet */
        .sheet-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .sheet-section {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }
        .sheet-section:last-child { border-bottom: none; }

        .section-label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }

        /* Balance in sheet */
        .sheet-balance-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .sheet-balance-symbol {
            font-family: 'DM Mono', monospace;
            font-size: 1.3rem;
            font-weight: 300;
            color: var(--green);
        }
        #sheetBalance {
            font-family: 'DM Mono', monospace;
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--text);
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }
        #sheetBalance:focus { color: var(--green); }

        /* ── TABLE ────────────────────────────────── */
        table { width: 100%; border-collapse: collapse; }

        thead tr { border-bottom: 1px solid var(--border); }

        th {
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 6px 10px;
            text-align: left;
        }
        th.right { text-align: right; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }

        td { padding: 9px 6px; font-size: 0.85rem; }

        .day-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px; height: 28px;
            border-radius: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 500;
        }

        .day-badge.last-day {
            background: rgba(124,106,247,0.1);
            border-color: rgba(124,106,247,0.3);
            color: var(--accent);
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            width: 36px;
        }

        .desc-cell {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .type-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .type-dot.credit { background: var(--green); box-shadow: 0 0 5px var(--green); }
        .type-dot.debit  { background: var(--red);   box-shadow: 0 0 5px var(--red); }

        .editable {
            cursor: text;
            padding: 3px 5px;
            border-radius: 4px;
            transition: background 0.15s;
            display: inline-block;
            min-width: 20px;
        }
        .editable:hover { background: rgba(255,255,255,0.04); }
        .editable:focus { background: var(--surface2); outline: 1px solid var(--accent); color: white; }

        .amt-cell {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .amt-cell.credit { color: var(--green); }
        .amt-cell.debit  { color: var(--red); }

        .btn-del {
            background: none; border: none; cursor: pointer;
            color: var(--dim); font-size: 0.8rem;
            padding: 6px 8px; border-radius: 6px;
            transition: all 0.15s; line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-del:active { color: var(--red); background: var(--red-dim); }


        .btn-reset {
            background: none;
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 9px 14px;
            font-size: 0.65rem;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-reset:active { color: var(--red); border-color: var(--red); background: var(--red-dim); }

        /* Safe-area bottom padding for iPhone home bar */
        .sheet-bottom-pad {
            flex-shrink: 0;
            height: env(safe-area-inset-bottom, 16px);
        }

        /* ── DESKTOP LAYOUT (≥768px) ──────────────── */
        @media (min-width: 768px) {
            html, body { overflow: auto; height: auto; }

            body { padding: 24px; display: block; }

            header {
                max-width: 1320px;
                margin: 0 auto 20px;
                padding: 0;
            }

            .main-area {
                display: none; /* hide mobile layout */
            }

            .desktop-container {
                max-width: 1320px;
                margin: 0 auto;
                display: grid;
                grid-template-columns: 520px 1fr;
                gap: 16px;
                align-items: start;
            }

            .desktop-panel {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                overflow: hidden;
            }

            .desktop-panel-section {
                padding: 22px 24px;
                border-bottom: 1px solid var(--border);
            }
            .desktop-panel-section:last-child { border-bottom: none; }

            .desktop-balance-row {
                display: flex;
                align-items: baseline;
                gap: 6px;
            }
            .desktop-balance-symbol {
                font-family: 'DM Mono', monospace;
                font-size: 1.6rem;
                font-weight: 300;
                color: var(--green);
                line-height: 1;
            }
            #desktopBalance {
                font-family: 'DM Mono', monospace;
                font-size: 2.8rem;
                font-weight: 500;
                color: var(--text);
                background: transparent;
                border: none;
                outline: none;
                width: 100%;
                font-variant-numeric: tabular-nums;
                line-height: 1;
                padding: 0;
                transition: color 0.2s;
            }
            #desktopBalance:focus { color: var(--green); }

            .desktop-stat-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .desktop-stat-pill {
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 12px 14px;
            }
            .desktop-stat-pill-label {
                font-size: 0.58rem;
                font-weight: 700;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                margin-bottom: 5px;
            }
            .desktop-stat-pill-label.credit { color: var(--green); }
            .desktop-stat-pill-label.debit  { color: var(--red); }
            .desktop-stat-pill-value {
                font-family: 'DM Mono', monospace;
                font-size: 1.15rem;
                font-weight: 500;
                font-variant-numeric: tabular-nums;
            }
            .desktop-stat-pill-value.credit { color: var(--green); }
            .desktop-stat-pill-value.debit  { color: var(--red); }

            .desktop-net-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 14px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 10px;
                margin-top: 10px;
            }
            .desktop-net-label {
                font-size: 0.62rem;
                font-weight: 700;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--muted);
            }


            .chart-panel {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 24px;
            }
            .chart-container { position: relative; height: 510px; }

            /* Hide mobile-only elements */
            .sheet-trigger, .backdrop, .sheet { display: none !important; }
        }

        @media (max-width: 767px) {
            .desktop-container { display: none; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════ MOBILE LAYOUT -->


<!-- Mobile main area: stats + chart -->
<div class="main-area" id="mainArea">
    <div class="stats-bar">
        <div class="stat-pill stat-pill-balance">
            <div class="stat-pill-label" style="color:var(--muted);">Balance</div>
            <div class="balance-pill-row">
                <span class="balance-pill-symbol">$</span>
                <input type="number" id="mBalance" class="balance-pill-input" value="2500" inputmode="decimal" pattern="[0-9]*" oninput="onBalanceInput(this.value)">
            </div>
        </div>
        <div class="stats-bar-right">
            <div class="stat-pill">
                <div class="stat-pill-label credit">Credits</div>
                <div class="stat-pill-value credit" id="mTotalIncome">$0</div>
            </div>
            <div class="stat-pill">
                <div class="stat-pill-label debit">Debits</div>
                <div class="stat-pill-value debit" id="mTotalDebits">$0</div>
            </div>
        </div>
    </div>

    <div class="chart-wrap">
        <canvas id="cashFlowChart"></canvas>
    </div>
</div>

<!-- Floating settings button -->
<button class="sheet-trigger" id="sheetTrigger" aria-label="Open settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
</button>

<!-- Backdrop -->
<div class="backdrop" id="backdrop"></div>

<!-- Pull-up Sheet -->
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
    <div class="sheet-handle-area" id="sheetHandle">
        <div class="sheet-handle"></div>
    </div>
    <div class="sheet-title-row">
        <span class="sheet-title">Settings &amp; Events</span>
        <button class="sheet-close" id="sheetClose" aria-label="Close">✕</button>
    </div>
    <div class="sheet-scroll" id="sheetScroll">



        <!-- Recurring Events Table -->
        <div class="sheet-section">
            <div class="section-label">Recurring Events</div>
            <table>
                <thead>
                    <tr>
                        <th style="width:44px;">Day</th>
                        <th>Description</th>
                        <th class="right">Credit</th>
                        <th class="right">Debit</th>
                        <th style="width:32px;"></th>
                    </tr>
                </thead>
                <tbody id="eventBody"></tbody>
            </table>
        </div>



        <!-- Reset -->
        <div class="sheet-section">
            <button class="btn-reset" onclick="resetDefaults()">↺ Reset to Defaults</button>
        </div>

        <div class="sheet-bottom-pad"></div>
    </div><!-- /sheet-scroll -->
</div><!-- /sheet -->


<!-- ═══════════════════════════════════════════ DESKTOP LAYOUT -->
<div class="desktop-container">

    <div class="desktop-panel">

        <div class="desktop-panel-section">
            <div class="section-label">Starting Balance</div>
            <div class="desktop-balance-row">
                <span class="desktop-balance-symbol">$</span>
                <input type="number" id="desktopBalance" value="2500" inputmode="decimal" pattern="[0-9]*" oninput="onBalanceInput(this.value)">
            </div>
        </div>

        <div class="desktop-panel-section">
            <div class="section-label">Monthly Summary</div>
            <div class="desktop-stat-row">
                <div class="desktop-stat-pill">
                    <div class="desktop-stat-pill-label credit">Credits</div>
                    <div class="desktop-stat-pill-value credit" id="dTotalIncome">$0</div>
                </div>
                <div class="desktop-stat-pill">
                    <div class="desktop-stat-pill-label debit">Debits</div>
                    <div class="desktop-stat-pill-value debit" id="dTotalDebits">$0</div>
                </div>
            </div>
            <div class="desktop-net-row">
                <span class="desktop-net-label">Monthly Net</span>
                <span id="dNetFlow" style="font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;">—</span>
            </div>
        </div>

        <div class="desktop-panel-section">
            <div class="section-label">Recurring Events</div>
            <table>
                <thead>
                    <tr>
                        <th style="width:40px;">Day</th>
                        <th>Description</th>
                        <th class="right">Credit</th>
                        <th class="right">Debit</th>
                        <th style="width:28px;"></th>
                    </tr>
                </thead>
                <tbody id="dEventBody"></tbody>
            </table>
        </div>



        <div class="desktop-panel-section">
            <button class="btn-reset" onclick="resetDefaults()" style="width:auto;">↺ Reset Defaults</button>
        </div>

    </div><!-- /desktop-panel -->

    <div class="chart-panel">
        <div class="chart-container">
            <canvas id="dCashFlowChart"></canvas>
        </div>
    </div>

</div><!-- /desktop-container -->


<script>


// ── Data ─────────────────────────────────────
const defaultEvents = [
    { day: 15,  amt: 8000, desc: "Mid-month Pay",      type: 'credit' },
    { day: 99,  amt: 6000, desc: "End-of-month Pay",   type: 'credit', lastDay: true },
    { day: 1,   amt: 8000, desc: "Main Fidelity Card", type: 'debit' },
    { day: 9,   amt: 200,  desc: "Verizon",            type: 'debit' },
    { day: 16,  amt: 1500, desc: "Amex",               type: 'debit' },
    { day: 16,  amt: 2313, desc: "Mortgage",           type: 'debit' }
];

let events = [];
let mobileChart, desktopChart;
const isMobile = () => window.innerWidth < 768;

// ── Init ─────────────────────────────────────
function init() {
    const rawStored = JSON.parse(localStorage.getItem('cf_events'));
    events = rawStored || defaultEvents;
    const savedBal = localStorage.getItem('cf_startBalance') || 2500;

    const mb = document.getElementById('mBalance');
    const db = document.getElementById('desktopBalance');
    if (mb) mb.value = savedBal;
    if (db) db.value = savedBal;

    saveAndRefresh();
}

function onBalanceInput(val) {
    ['mBalance','desktopBalance'].forEach(id => {
        const el = document.getElementById(id);
        if (el && el.value != val) el.value = val;
    });
    saveAndRefresh();
}

function getBalance() {
    const el = document.getElementById(isMobile() ? 'mBalance' : 'desktopBalance');
    return parseFloat(el ? el.value : 0) || 0;
}

function saveAndRefresh() {
    localStorage.setItem('cf_events', JSON.stringify(events));
    const bal = getBalance();
    localStorage.setItem('cf_startBalance', bal);
    renderTable();
    updateStats();
    updateForecast();
}

function resetDefaults() {
    if (confirm("Wipe all data and restore defaults?")) {
        localStorage.removeItem('cf_events');
        localStorage.removeItem('cf_startBalance');
        location.reload();
    }
}

function handleEnter(e) {
    if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
}

// ── Stats ─────────────────────────────────────
function updateStats() {
    const income = events.filter(e => e.type === 'credit').reduce((s, e) => s + e.amt, 0);
    const bills  = events.filter(e => e.type === 'debit').reduce((s, e) => s + e.amt, 0);
    const net    = income - bills;
    const netStr = (net < 0 ? '-$' : '+$') + Math.abs(net).toLocaleString();
    const netColor = net >= 0 ? 'var(--green)' : 'var(--red)';
    const fmt = v => `$${v.toLocaleString()}`;

    // Mobile stats bar
    const mI = document.getElementById('mTotalIncome');
    const mD = document.getElementById('mTotalDebits');
    if (mI) mI.textContent = fmt(income);
    if (mD) mD.textContent = fmt(bills);

    // Sheet summary
    const sI = document.getElementById('totalIncome');
    const sD = document.getElementById('totalDebits');
    const sN = document.getElementById('netFlow');
    if (sI) sI.textContent = fmt(income);
    if (sD) sD.textContent = fmt(bills);
    if (sN) { sN.textContent = netStr; sN.style.color = netColor; }

    // Desktop summary
    const dI = document.getElementById('dTotalIncome');
    const dD = document.getElementById('dTotalDebits');
    const dN = document.getElementById('dNetFlow');
    if (dI) dI.textContent = fmt(income);
    if (dD) dD.textContent = fmt(bills);
    if (dN) { dN.textContent = netStr; dN.style.color = netColor; }
}

// ── Table ─────────────────────────────────────
function renderTable() {
    const sorted = [...events].sort((a, b) => {
        if (a.lastDay && !b.lastDay) return 1;
        if (!a.lastDay && b.lastDay) return -1;
        return a.day - b.day;
    });

    const makeRows = (prefix) => sorted.map((ev) => {
        const isCredit = ev.type === 'credit';
        const badgeClass = ev.lastDay ? 'day-badge last-day' : 'day-badge';
        const dayDisplay = ev.lastDay ? 'EOM' : ev.day;
        const realIdx = events.indexOf(ev);
        return `
            <tr>
                <td><span class="${badgeClass}">${dayDisplay}</span></td>
                <td>
                    <div class="desc-cell">
                        <span class="type-dot ${isCredit ? 'credit' : 'debit'}"></span>
                        <div class="editable" contenteditable="true" spellcheck="false" onkeydown="handleEnter(event)" onblur="editEvent(${realIdx}, 'desc', this.innerText)">${ev.desc}</div>
                    </div>
                </td>
                <td class="amt-cell credit">
                    ${isCredit ? `<div class="editable" contenteditable="true" onkeydown="handleEnter(event)" onblur="editEvent(${realIdx}, 'amt', this.innerText)">${ev.amt.toLocaleString()}</div>` : ''}
                </td>
                <td class="amt-cell debit">
                    ${!isCredit ? `<div class="editable" contenteditable="true" onkeydown="handleEnter(event)" onblur="editEvent(${realIdx}, 'amt', this.innerText)">${ev.amt.toLocaleString()}</div>` : ''}
                </td>
                <td><button class="btn-del" onclick="deleteEvent(${realIdx})">✕</button></td>
            </tr>
        `;
    }).join('');

    const sheetBody = document.getElementById('eventBody');
    const deskBody  = document.getElementById('dEventBody');
    if (sheetBody) sheetBody.innerHTML = makeRows('s');
    if (deskBody)  deskBody.innerHTML  = makeRows('d');

    // Set inputmode="decimal" on amount contenteditable cells so mobile shows numeric keypad
    document.querySelectorAll('.amt-cell .editable').forEach(el => {
        el.setAttribute('inputmode', 'decimal');
    });
}

function editEvent(index, field, value) {
    if (field === 'desc') events[index].desc = value.trim();
    if (field === 'amt')  events[index].amt  = Math.abs(parseFloat(value.replace(/[^0-9.]/g, ""))) || 0;
    saveAndRefresh();
}

function deleteEvent(index) {
    events.splice(index, 1);
    saveAndRefresh();
}

// ── Chart ─────────────────────────────────────
function updateForecast() {
    const bal = getBalance();
    const labels = [], data = [];
    let cur = bal;
    const today = new Date(); today.setHours(0,0,0,0);

    for (let i = 0; i <= 30; i++) {
        const date = new Date(today);
        date.setDate(today.getDate() + i);
        const lastDayOfMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
        events.forEach(ev => {
            const effDay = ev.lastDay ? lastDayOfMonth : ev.day;
            if (date.getDate() === effDay) cur += ev.type === 'credit' ? ev.amt : -ev.amt;
        });
        labels.push(date.getTime());
        data.push(cur);
    }

    renderChart('cashFlowChart',  mobileChart,  labels, data, c => mobileChart  = c);
    renderChart('dCashFlowChart', desktopChart, labels, data, c => desktopChart = c);
}

function renderChart(canvasId, existingChart, labels, data, setChart) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (existingChart) existingChart.destroy();

    const dataMin = Math.min(...data, -500);
    const dataMax = Math.max(...data, 1500);
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.clientHeight || 400);
    gradient.addColorStop(0,   'rgba(0,229,176,0.18)');
    gradient.addColorStop(0.5, 'rgba(0,229,176,0.04)');
    gradient.addColorStop(1,   'rgba(0,229,176,0)');

    const newChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                data,
                borderColor: '#00e5b0',
                backgroundColor: gradient,
                borderWidth: 2,
                stepped: 'after',
                fill: true,
                pointRadius: 0,
                pointHitRadius: 20,
                tension: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'day', displayFormats: { day: 'MMM d' } },
                    ticks: { color: '#5a5a72', font: { size: 11, family: "'DM Mono'", weight: '500' }, maxRotation: 0, maxTicksLimit: 7 },
                    grid: { display: false },
                    border: { color: 'rgba(255,255,255,0.05)' }
                },
                y: {
                    min: dataMin, max: dataMax,
                    afterBuildTicks: axis => {
                        const cur = axis.ticks.map(t => t.value);
                        if (!cur.includes(0))    axis.ticks.push({ value: 0 });
                        if (!cur.includes(1000)) axis.ticks.push({ value: 1000 });
                        axis.ticks.sort((a, b) => a.value - b.value);
                    },
                    ticks: {
                        font: { size: 11, family: "'DM Mono'", weight: '500' },
                        color: c => {
                            if (c.tick.value === 0)    return '#ff4757';
                            if (c.tick.value === 1000) return '#ffd32a';
                            return '#5a5a72';
                        },
                        callback: v => (v < 0 ? '-$' : '$') + Math.abs(v).toLocaleString()
                    },
                    grid: {
                        color: c => {
                            if (c.tick.value === 0)    return 'rgba(255,71,87,0.35)';
                            if (c.tick.value === 1000) return 'rgba(255,211,42,0.2)';
                            return 'rgba(255,255,255,0.035)';
                        },
                        lineWidth: c => (c.tick.value === 0 || c.tick.value === 1000) ? 1.5 : 1,
                        borderDash: c => c.tick.value === 1000 ? [5,4] : []
                    },
                    border: { color: 'rgba(255,255,255,0.05)' }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    mode: 'index', intersect: false,
                    backgroundColor: '#18181f',
                    borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
                    titleColor: '#00e5b0',
                    titleFont: { size: 12, family: "'DM Mono'", weight: '500' },
                    bodyColor: '#f0f0f5',
                    bodyFont: { size: 14, family: "'DM Mono'" },
                    padding: 12, cornerRadius: 10, displayColors: false,
                    callbacks: {
                        title: items => new Date(items[0].parsed.x)
                            .toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }),
                        label: c => {
                            const v = c.parsed.y;
                            return 'Balance  ' + (v < 0 ? '-$' : '$') + Math.abs(v).toLocaleString();
                        }
                    }
                }
            }
        }
    });
    setChart(newChart);
}

// ── PULL-UP SHEET ─────────────────────────────
const sheet     = document.getElementById('sheet');
const backdrop  = document.getElementById('backdrop');
const sheetScroll = document.getElementById('sheetScroll');

function openSheet() {
    sheet.classList.add('open');
    backdrop.classList.add('visible');
    document.body.style.overflow = 'hidden';
}

function closeSheet() {
    // Only close if scrolled to top of sheet content
    if (sheetScroll.scrollTop > 0) {
        sheetScroll.scrollTo({ top: 0, behavior: 'smooth' });
        return;
    }
    sheet.classList.remove('open');
    backdrop.classList.remove('visible');
    document.body.style.overflow = '';
}

document.getElementById('sheetTrigger').addEventListener('click', openSheet);
document.getElementById('sheetClose').addEventListener('click', closeSheet);
backdrop.addEventListener('click', closeSheet);

// ── Sheet drag-to-dismiss ─────────────────────
// Only fires when sheetScroll is scrolled to top.
// When content is scrolled, drag just scrolls the sheet.
let sheetDragStartY = 0;
let sheetDragCurY   = 0;
let sheetDragging   = false;
let sheetDragIntent = null; // 'dismiss' | 'scroll' | null

const handleArea = document.getElementById('sheetHandle');

function sheetTouchStart(e) {
    sheetDragStartY = e.touches[0].clientY;
    sheetDragCurY   = sheetDragStartY;
    sheetDragging   = true;
    sheetDragIntent = null;
    sheet.style.transition = 'none';
}

function sheetTouchMove(e) {
    if (!sheetDragging) return;
    sheetDragCurY = e.touches[0].clientY;
    const dy = sheetDragCurY - sheetDragStartY;

    // Determine intent once we have some movement
    if (sheetDragIntent === null && Math.abs(dy) > 6) {
        // If scrolled down in content and dragging up, let scroll handle it
        if (sheetScroll.scrollTop > 0 && dy < 0) {
            sheetDragIntent = 'scroll';
            sheet.style.transition = '';
            return;
        }
        // If scrolled down and dragging down, scroll up first
        if (sheetScroll.scrollTop > 0 && dy > 0) {
            sheetDragIntent = 'scroll';
            sheet.style.transition = '';
            return;
        }
        // At top, dragging down = dismiss
        if (sheetScroll.scrollTop <= 0 && dy > 0) {
            sheetDragIntent = 'dismiss';
        } else {
            sheetDragIntent = 'scroll';
            sheet.style.transition = '';
            return;
        }
    }

    if (sheetDragIntent === 'dismiss') {
        e.preventDefault();
        const translate = Math.max(0, dy);
        sheet.style.transform = `translateY(${translate}px)`;
    }
}

function sheetTouchEnd() {
    if (!sheetDragging) return;
    sheetDragging = false;
    sheet.style.transition = '';

    if (sheetDragIntent === 'dismiss') {
        const dy = sheetDragCurY - sheetDragStartY;
        if (dy > 120) {
            // Flick/drag past threshold → close
            sheet.style.transform = '';
            sheet.classList.remove('open');
            backdrop.classList.remove('visible');
            document.body.style.overflow = '';
        } else {
            // Snap back
            sheet.style.transform = '';
        }
    } else {
        sheet.style.transform = '';
    }
    sheetDragIntent = null;
}

// Attach drag to handle area and the title row
[handleArea, document.querySelector('.sheet-title-row')].forEach(el => {
    el.addEventListener('touchstart', sheetTouchStart, { passive: true });
    el.addEventListener('touchmove',  sheetTouchMove,  { passive: false });
    el.addEventListener('touchend',   sheetTouchEnd,   { passive: true });
});

// ── Main area: drag vs click detection ────────
// Chart.js handles its own touch for tooltips, but we need to make sure
// scrolling the page doesn't get misinterpreted as a click on the trigger.
// We track drag distance on the main area to disable accidental sheet open.
const mainArea = document.getElementById('mainArea');
let mainTouchStartX = 0, mainTouchStartY = 0;
let mainDragDistance = 0;

mainArea.addEventListener('touchstart', e => {
    mainTouchStartX = e.touches[0].clientX;
    mainTouchStartY = e.touches[0].clientY;
    mainDragDistance = 0;
}, { passive: true });

mainArea.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - mainTouchStartX;
    const dy = e.touches[0].clientY - mainTouchStartY;
    mainDragDistance = Math.sqrt(dx*dx + dy*dy);
}, { passive: true });

// The sheet trigger button is not inside mainArea, so no conflict there.
// But in case something delegates click up from the chart canvas:
mainArea.addEventListener('click', e => {
    if (mainDragDistance > 8) {
        e.stopPropagation();
        e.preventDefault();
    }
}, true);

// ── Keyboard shortcut: Escape ─────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeSheet();
});

// ── Boot ──────────────────────────────────────
init();
</script>
