<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Flow Forecast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.29.3/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --bg:        #0a0a0f;
            --surface:   #111118;
            --surface2:  #18181f;
            --border:    rgba(255,255,255,0.07);
            --border2:   rgba(255,255,255,0.12);
            --text:      #f0f0f5;
            --muted:     #5a5a72;
            --dim:       #3a3a50;
            --green:     #00e5b0;
            --green-dim: rgba(0,229,176,0.08);
            --red:       #ff4757;
            --red-dim:   rgba(255,71,87,0.08);
            --yellow:    #ffd32a;
            --accent:    #7c6af7;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
            background-image:
                linear-gradient(rgba(124,106,247,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,106,247,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── HEADER ───────────────────────────────── */
        header {
            max-width: 1320px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .header-date {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
        }

        /* ── LAYOUT ───────────────────────────────── */
        .container {
            max-width: 1320px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 520px 1fr;
            gap: 16px;
            align-items: start;
        }

        /* ── PANELS ───────────────────────────────── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .panel-section {
            padding: 22px 24px;
            border-bottom: 1px solid var(--border);
        }
        .panel-section:last-child { border-bottom: none; }

        .section-label {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }

        /* ── BALANCE HERO ─────────────────────────── */
        .balance-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .balance-symbol {
            font-family: 'DM Mono', monospace;
            font-size: 1.6rem;
            font-weight: 300;
            color: var(--green);
            line-height: 1;
        }

        #startBalance {
            font-family: 'DM Mono', monospace;
            font-size: 2.8rem;
            font-weight: 500;
            color: var(--text);
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }
        #startBalance:focus { color: var(--green); }

        input[type=number] { -moz-appearance: textfield !important; appearance: textfield !important; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none !important; margin: 0 !important; }

        .balance-hint {
            font-size: 0.68rem;
            color: var(--dim);
            margin-top: 6px;
            font-family: 'DM Mono', monospace;
        }

        /* ── STAT PILLS ───────────────────────────── */
        .stat-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-pill {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .stat-pill-label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .stat-pill-label.credit { color: var(--green); }
        .stat-pill-label.debit  { color: var(--red); }

        .stat-pill-value {
            font-family: 'DM Mono', monospace;
            font-size: 1.15rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }
        .stat-pill-value.credit { color: var(--green); }
        .stat-pill-value.debit  { color: var(--red); }

        .net-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-top: 10px;
        }

        .net-label {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        #netFlow {
            font-family: 'DM Mono', monospace;
            font-size: 1rem;
            font-weight: 500;
        }

        /* ── TABLE ────────────────────────────────── */
        table { width: 100%; border-collapse: collapse; }

        thead tr { border-bottom: 1px solid var(--border); }

        th {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 8px 10px;
            text-align: left;
        }
        th.right { text-align: right; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }

        td { padding: 8px 8px; font-size: 0.88rem; }

        .day-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px; height: 28px;
            border-radius: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 500;
        }

        .day-badge.last-day {
            background: rgba(124,106,247,0.1);
            border-color: rgba(124,106,247,0.3);
            color: var(--accent);
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            width: 36px;
        }

        .desc-cell {
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }

        .type-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .type-dot.credit { background: var(--green); box-shadow: 0 0 5px var(--green); }
        .type-dot.debit  { background: var(--red);   box-shadow: 0 0 5px var(--red); }

        .editable {
            cursor: text;
            padding: 3px 5px;
            border-radius: 4px;
            transition: background 0.15s;
            display: inline-block;
        }
        .editable:hover { background: rgba(255,255,255,0.04); }
        .editable:focus { background: var(--surface2); outline: 1px solid var(--accent); color: white; }

        .amt-cell {
            font-family: 'DM Mono', monospace;
            font-size: 0.83rem;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .amt-cell.credit { color: var(--green); }
        .amt-cell.debit  { color: var(--red); }

        .btn-del {
            background: none; border: none; cursor: pointer;
            color: var(--dim); font-size: 0.8rem;
            padding: 4px 6px; border-radius: 4px;
            transition: all 0.15s; line-height: 1;
        }
        .btn-del:hover { color: var(--red); background: var(--red-dim); }

        .btn-reset {
            background: none;
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 7px 12px;
            font-size: 0.68rem;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-reset:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

        /* ── RIGHT PANEL ──────────────────────────── */
        .chart-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .chart-legend {
            display: flex;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.62rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }

        .legend-swatch {
            width: 18px; height: 2px; border-radius: 2px;
        }
        .legend-swatch.solid-red    { background: var(--red); }
        .legend-swatch.dashed-yellow {
            background: repeating-linear-gradient(
                to right,
                var(--yellow) 0, var(--yellow) 4px,
                transparent 4px, transparent 7px
            );
        }

        .chart-container { position: relative; height: 510px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-mark">CF</div>
        <span class="logo-text">Cash Flow</span>
    </div>
    <div class="header-date" id="headerDate"></div>
</header>

<div class="container">

    <div class="panel">

        <div class="panel-section">
            <div class="section-label">Starting Balance</div>
            <div class="balance-row">
                <span class="balance-symbol">$</span>
                <input type="number" id="startBalance" value="2500" oninput="saveAndRefresh()">
            </div>
            <div class="balance-hint">current cash on hand</div>
        </div>

        <div class="panel-section">
            <div class="section-label">Monthly Summary</div>
            <div class="stat-row">
                <div class="stat-pill">
                    <div class="stat-pill-label credit">Credits</div>
                    <div class="stat-pill-value credit" id="totalIncome">$0</div>
                </div>
                <div class="stat-pill">
                    <div class="stat-pill-label debit">Debits</div>
                    <div class="stat-pill-value debit" id="totalDebits">$0</div>
                </div>
            </div>
            <div class="net-row">
                <span class="net-label">Monthly Net</span>
                <span id="netFlow">—</span>
            </div>
        </div>

        <div class="panel-section">
            <div class="section-label">Recurring Events</div>
            <table>
                <thead>
                    <tr>
                        <th style="width:40px;">Day</th>
                        <th>Description</th>
                        <th class="right">Credit</th>
                        <th class="right">Debit</th>
                        <th style="width:28px;"></th>
                    </tr>
                </thead>
                <tbody id="eventBody"></tbody>
            </table>
        </div>

        <div class="panel-section">
            <button class="btn-reset" onclick="resetDefaults()">↺ Reset Defaults</button>
        </div>

    </div>

    <div class="chart-panel">

        <div class="chart-container">
            <canvas id="cashFlowChart"></canvas>
        </div>
    </div>

</div>

<script>
    document.getElementById('headerDate').textContent =
        new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    const defaultEvents = [
        { day: 15,  amt: 8000, desc: "Mid-month Pay",      type: 'credit' },
        { day: 99,  amt: 6000, desc: "End-of-month Pay",   type: 'credit', lastDay: true },
        { day: 1,   amt: 8000, desc: "Main Fidelity Card", type: 'debit' },
        { day: 9,   amt: 200,  desc: "Verizon",            type: 'debit' },
        { day: 16,  amt: 1500, desc: "Amex",               type: 'debit' },
        { day: 16,  amt: 2313, desc: "Mortgage",           type: 'debit' }
    ];

    let events = [];

    function init() {
        const rawStored = JSON.parse(localStorage.getItem('cf_events'));
        events = rawStored || defaultEvents;
        document.getElementById('startBalance').value = localStorage.getItem('cf_startBalance') || 2500;
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('cf_events', JSON.stringify(events));
        localStorage.setItem('cf_startBalance', document.getElementById('startBalance').value);
        renderTable();
        updateForecast();
    }

    function resetDefaults() {
        if (confirm("Wipe all data and restore defaults?")) {
            localStorage.removeItem('cf_events');
            localStorage.removeItem('cf_startBalance');
            location.reload();
        }
    }

    let chart;

    function handleEnter(e) {
        if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
    }

    function renderTable() {
        const body = document.getElementById('eventBody');
        const sorted = [...events].sort((a, b) => {
            if (a.lastDay && !b.lastDay) return 1;
            if (!a.lastDay && b.lastDay) return -1;
            return a.day - b.day;
        });

        let rows = '';
        sorted.forEach((ev, idx) => {
            const isCredit = ev.type === 'credit';
            const badgeClass = ev.lastDay ? 'day-badge last-day' : 'day-badge';
            const dayDisplay = ev.lastDay ? 'EOM' : ev.day;

            rows += `
                <tr>
                    <td><span class="${badgeClass}">${dayDisplay}</span></td>
                    <td>
                        <div class="desc-cell">
                            <span class="type-dot ${isCredit ? 'credit' : 'debit'}"></span>
                            <div class="editable" contenteditable="true" onkeydown="handleEnter(event)" onblur="editEvent(${idx}, 'desc', this.innerText)">${ev.desc}</div>
                        </div>
                    </td>
                    <td class="amt-cell credit">
                        ${isCredit ? `<div class="editable" contenteditable="true" onkeydown="handleEnter(event)" onblur="editEvent(${idx}, 'amt', this.innerText)">${ev.amt.toLocaleString()}</div>` : ''}
                    </td>
                    <td class="amt-cell debit">
                        ${!isCredit ? `<div class="editable" contenteditable="true" onkeydown="handleEnter(event)" onblur="editEvent(${idx}, 'amt', this.innerText)">${ev.amt.toLocaleString()}</div>` : ''}
                    </td>
                    <td><button class="btn-del" onclick="deleteEvent(${idx})">✕</button></td>
                </tr>
            `;
        });
        body.innerHTML = rows;

        const income = events.filter(e => e.type === 'credit').reduce((s, e) => s + e.amt, 0);
        const bills  = events.filter(e => e.type === 'debit').reduce((s, e) => s + e.amt, 0);
        const net    = income - bills;

        document.getElementById('totalIncome').textContent = `$${income.toLocaleString()}`;
        document.getElementById('totalDebits').textContent = `$${bills.toLocaleString()}`;

        const netEl = document.getElementById('netFlow');
        netEl.textContent = (net < 0 ? '-$' : '+$') + Math.abs(net).toLocaleString();
        netEl.style.color = net >= 0 ? 'var(--green)' : 'var(--red)';
    }

    function editEvent(index, field, value) {
        if (field === 'desc') events[index].desc = value;
        if (field === 'amt')  events[index].amt  = Math.abs(parseFloat(value.replace(/[^0-9.-]+/g, ""))) || 0;
        saveAndRefresh();
    }

    function deleteEvent(index) {
        events.splice(index, 1);
        saveAndRefresh();
    }

    function updateForecast() {
        const startBalance = parseFloat(document.getElementById('startBalance').value) || 0;
        const labels = [];
        const data = [];
        let currentBalance = startBalance;

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        for (let i = 0; i <= 30; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() + i);

            const lastDayOfMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();

            events.forEach(ev => {
                const effectiveDay = ev.lastDay ? lastDayOfMonth : ev.day;
                if (date.getDate() === effectiveDay) {
                    currentBalance += (ev.type === 'credit' ? ev.amt : -ev.amt);
                }
            });

            labels.push(date.getTime());
            data.push(currentBalance);
        }

        renderChart(labels, data);
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('cashFlowChart').getContext('2d');
        if (chart) chart.destroy();

        const dataMin = Math.min(...data, -500);
        const dataMax = Math.max(...data, 1500);

        const gradient = ctx.createLinearGradient(0, 0, 0, 510);
        gradient.addColorStop(0,   'rgba(0,229,176,0.18)');
        gradient.addColorStop(0.5, 'rgba(0,229,176,0.04)');
        gradient.addColorStop(1,   'rgba(0,229,176,0)');

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    data,
                    borderColor: '#00e5b0',
                    backgroundColor: gradient,
                    borderWidth: 2,
                    stepped: 'after',
                    fill: true,
                    pointRadius: 0,
                    pointHitRadius: 20,
                    tension: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'day', displayFormats: { day: 'MMM d' } },
                        ticks: {
                            color: '#5a5a72',
                            font: { size: 14, family: "'DM Mono'", weight: '500' },
                            maxRotation: 0
                        },
                        grid: { display: false },
                        border: { color: 'rgba(255,255,255,0.05)' }
                    },
                    y: {
                        min: dataMin,
                        max: dataMax,
                        afterBuildTicks: axis => {
                            const current = axis.ticks.map(t => t.value);
                            if (!current.includes(0))    axis.ticks.push({ value: 0 });
                            if (!current.includes(1000)) axis.ticks.push({ value: 1000 });
                            axis.ticks.sort((a, b) => a.value - b.value);
                        },
                        ticks: {
                            font: { size: 14, family: "'DM Mono'", weight: '500' },
                            color: c => {
                                if (c.tick.value === 0)    return '#ff4757';
                                if (c.tick.value === 1000) return '#ffd32a';
                                return '#5a5a72';
                            },
                            callback: v => (v < 0 ? '-$' : '$') + Math.abs(v).toLocaleString()
                        },
                        grid: {
                            color: c => {
                                if (c.tick.value === 0)    return 'rgba(255,71,87,0.35)';
                                if (c.tick.value === 1000) return 'rgba(255,211,42,0.2)';
                                return 'rgba(255,255,255,0.035)';
                            },
                            lineWidth: c => (c.tick.value === 0 || c.tick.value === 1000) ? 1.5 : 1,
                            borderDash: c => c.tick.value === 1000 ? [5, 4] : []
                        },
                        border: { color: 'rgba(255,255,255,0.05)' }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: '#18181f',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1,
                        titleColor: '#00e5b0',
                        titleFont: { size: 14, family: "'DM Mono'", weight: '500' },
                        bodyColor: '#f0f0f5',
                        bodyFont: { size: 16, family: "'DM Mono'" },
                        padding: 14,
                        cornerRadius: 10,
                        displayColors: false,
                        callbacks: {
                            title: items => new Date(items[0].parsed.x)
                                .toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }),
                            label: c => {
                                const v = c.parsed.y;
                                return 'Balance  ' + (v < 0 ? '-$' : '$') + Math.abs(v).toLocaleString();
                            }
                        }
                    }
                }
            }
        });
    }

    init();
</script>
</body>
</html>
