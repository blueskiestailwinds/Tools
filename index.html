<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tools</title>

    <style>
        :root {
            --bg: #131314;
            --card-bg: #1e1f20;
            --border: #333537;
            --text-main: #e3e3e3;
            --text-muted: #94a3b8;
            --x-green: #15803d;
            --r-yellow: #fde047;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 2rem 0;
            color: var(--text-main);
            letter-spacing: 0.02em;
        }

        .tool-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 420px;
        }

        .tool-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            color: var(--text-main);
            transition: border-color 0.15s, background 0.15s;
        }

        .tool-card:hover {
            border-color: #555;
            background: #25262a;
        }

        .tool-card .icon {
            font-size: 2rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .tool-card .info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .tool-card .name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .tool-card .desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <h1>Tools</h1>

    <div class="tool-grid">
        <a class="tool-card" href="https://tools.blueskiestailwinds.com/ReserveSim/">
            <span class="icon">📅</span>
            <div class="info">
                <span class="name">Reserve Simulator</span>
                <span class="desc">Simulate reserve availability and scheduling</span>
            </div>
        </a>

        <a class="tool-card" href="https://tools.blueskiestailwinds.com/pcs/">
            <span class="icon">✈️</span>
            <div class="info">
                <span class="name">PCS Planner</span>
                <span class="desc">Plan and track your PCS move timeline</span>
            </div>
        </a>
    </div>
</body>

</html>
