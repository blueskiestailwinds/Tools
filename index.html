<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            margin: 0;
            background: #131314;
            color: #e3e3e3;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 1rem;
        }
        p { margin: 0; font-size: 1.1rem; }
        .muted { color: #94a3b8; font-size: 0.9rem; }
        #count { font-size: 2.5rem; font-weight: 700; }
    </style>
</head>
<body>
    <p>Redirecting to <strong>reserve.blueskiestailwinds.com</strong></p>
    <p class="muted">Please update your bookmark.</p>
    <div id="count">8</div>
    <script>
        let n = 3;
        const el = document.getElementById('count');
        const t = setInterval(() => {
            n--;
            el.textContent = n;
            if (n <= 0) {
                clearInterval(t);
                window.location.replace("https://reserve.blueskiestailwinds.com");
            }
        }, 1000);
    </script>
</body>
</html>
